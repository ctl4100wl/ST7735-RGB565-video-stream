[env:4d_systems_esp32s3_gen4_r8n16]
platform = espressif32
board = 4d_systems_esp32s3_gen4_r8n16
framework = arduino

board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi

monitor_speed = 115200

lib_deps =
  bodmer/TFT_eSPI


build_flags =
  -D ARDUINO_USB_MODE=0
  -D ARDUINO_USB_CDC_ON_BOOT=1

  -D USER_SETUP_LOADED
  -D USE_HSPI_PORT

  -D ST7735_DRIVER
  -D ST7735_BLACKTAB

  -D TFT_WIDTH=128
  -D TFT_HEIGHT=160

  -D TFT_MOSI=11
  -D TFT_MISO=13
  -D TFT_SCLK=12
  -D TFT_CS=10
  -D TFT_DC=9
  -D TFT_RST=8

  -D TFT_RGB_ORDER=TFT_RGB
  -D TFT_INVERSION_OFF

  -D LOAD_GLCD
  -D LOAD_FONT2
  -D LOAD_FONT4
  -D LOAD_FONT6
  -D LOAD_FONT7
  -D LOAD_FONT8
  -D LOAD_GFXFF
  -D SMOOTH_FONT

  -D SPI_FREQUENCY=27000000
  -D SPI_READ_FREQUENCY=16000000
